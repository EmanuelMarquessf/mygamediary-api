version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mygamediary_container
    restart: always
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: minha_senha_secreta_123
      POSTGRES_DB: mygamediary_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
