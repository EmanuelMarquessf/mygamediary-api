version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mygamediary_container
    restart: always
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: minha_senha_secreta_123
      POSTGRES_DB: mygamediary_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: . # O ponto indica que o Dockerfile do seu back está nesta mesma pasta
    container_name: game_diary_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://dev_user:minha_senha_secreta_123@db:5432/mygamediary_db?schema=public"
    depends_on:
      - db

volumes:
  postgres_data:
